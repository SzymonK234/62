<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body onload="marka()">
    <div id="blok1"></div>
    <br><br>
    <div id="blok2"></div>
    <br><br>
    <div id="blok3"></div>

    <script>
        let con = document.getElementById("blok1");
        let kon = document.getElementById("blok2");
        let siema = document.getElementById("blok3");
        let gitary = ["Gibson Les Paul", "Fender Stratocaster", "Ibanez RG", "PRS Custom 24", "Yamaha Pacifica"];

        function marka() {
            for (let i = 0; i < gitary.length; i++) {
                con.innerHTML += `<p>${gitary[i]}</p>`;
            }
            kon.innerHTML = `<p>${gitary[0]}</p>`;
            kon.innerHTML += `<p>${gitary[1]}</p>`;
            siema.innerHTML += `<p>${gitary[0]}</p>`;
        }
    </script>
</body>

</html>
